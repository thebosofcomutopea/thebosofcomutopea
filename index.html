<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Eglercraft Horror Forest</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: Arial, sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #ui { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.12); padding: 10px; width: 260px; }
    #ui p { margin: 6px 0; font-size: 14px; }
    #status { margin-top: 10px; font-size: 13px; line-height: 1.4; }
    #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
    .hotbar-slot { width: 45px; height: 45px; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #f0f0f0; }
    .hotbar-slot.selected { border-color: #81d4fa; background: rgba(3, 169, 244, 0.2); }
    #overlay { position: absolute; inset: 0; pointer-events: none; }
    #menu { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 10; }
    .panel { background: #111; border: 2px solid #444; padding: 20px; width: min(700px, 90vw); color: #ddd; }
    .panel h2 { margin-top: 0; }
    .inventory-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .slot { background: #222; border: 1px solid #555; min-height: 60px; padding: 6px; font-size: 13px; }
    .recipe { background: #171717; border: 1px solid #444; margin: 6px 0; padding: 10px; cursor: pointer; }
    .recipe.craftable { border-color: #4caf50; }
    .button { background: #263238; border: 1px solid #81d4fa; color: #fff; padding: 8px 14px; cursor: pointer; margin-top: 12px; }
    .button:hover { background: #37474f; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <p><strong>Eglercraft Horror Forest</strong></p>
    <p>Click canvas to lock mouse, then use <strong>WASD</strong> to move and look around.</p>
    <p><strong>I</strong> = Inventory, <strong>C</strong> = Crafting</p>
    <p><strong>Q/E</strong> = Lean left/right</p>
    <p id="status"></p>
  </div>
  <div id="hotbar"></div>
  <div id="overlay"></div>

  <div id="menu">
    <div class="panel" id="menuPanel"></div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiStatus = document.getElementById('status');
    const hotbar = document.getElementById('hotbar');
    const overlay = document.getElementById('overlay');
    const menu = document.getElementById('menu');
    const menuPanel = document.getElementById('menuPanel');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const player = {
      x: 10,
      y: 10,
      yaw: 0,
      pitch: 0,
      speed: 0,
      turn: 0,
      sanity: 100,
      health: 100,
      torch: false,
      dead: false,
      inHouse: false,
    };

    const state = {
      time: 8,
      night: false,
      stakerActive: false,
      staker: { x: 16, y: 16, distance: 999, chase: false },
      jumpScare: false,
      ambientOn: false,
      soundtrackStarted: false,
      glowTimer: 0,
      alert: 'Explore the haunted forest and survive the night.',
      lastCraft: null,
      factoryBuilt: false,
    };

    const world = [];
    const objects = [];
    const inventory = { wood: 5, stone: 2, stick: 0, torch: 1, planks: 0, crafting_table: 0, sword: 0, pickaxe: 0, factory: 0 };
    let selectedSlot = 0;

    const itemLabels = {
      wood: 'Wood', stone: 'Stone', stick: 'Stick', torch: 'Torch', planks: 'Planks', crafting_table: 'Crafting Table', sword: 'Sword', pickaxe: 'Pickaxe', factory: 'Factory', apple: 'Apple'
    };

    const recipes = [
      { name: 'Wooden Planks', requires: { wood: 1 }, produces: { planks: 4 } },
      { name: 'Stick', requires: { planks: 1 }, produces: { stick: 4 } },
      { name: 'Crafting Table', requires: { planks: 4 }, produces: { crafting_table: 1 } },
      { name: 'Wooden Pickaxe', requires: { planks: 3, stick: 2 }, produces: { pickaxe: 1 } },
      { name: 'Wooden Sword', requires: { planks: 2, stick: 1 }, produces: { sword: 1 } },
      { name: 'Torch', requires: { stick: 1, coal: 0 }, produces: { torch: 4 } },
      { name: 'Factory', requires: { stone: 4, planks: 4 }, produces: { factory: 1 } }
    ];

    function buildWorld() {
      for (let x = 0; x < 20; x++) {
        world[x] = [];
        for (let y = 0; y < 20; y++) {
          if ((x > 6 && x < 13 && y > 6 && y < 13)) {
            world[x][y] = 'house';
          } else if (Math.random() < 0.08) {
            world[x][y] = 'tree';
          } else if (Math.random() < 0.05) {
            world[x][y] = 'rock';
          } else {
            world[x][y] = 'grass';
          }
        }
      }
      world[10][10] = 'spawn';
      world[8][8] = 'torch';
      world[12][9] = 'torch';
      objects.push({ type: 'factoryNode', x: 3, y: 16 });
    }

    buildWorld();

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    let ambientOsc, chaseOsc;

    function startAmbient() {
      if (state.soundtrackStarted) return;
      state.soundtrackStarted = true;
      ambientOsc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      ambientOsc.frequency.value = 60;
      ambientOsc.type = 'sine';
      gain.gain.value = 0.003;
      ambientOsc.connect(gain).connect(audioContext.destination);
      ambientOsc.start();

      chaseOsc = audioContext.createOscillator();
      const chaseGain = audioContext.createGain();
      chaseOsc.frequency.value = 90;
      chaseOsc.type = 'triangle';
      chaseGain.gain.value = 0;
      chaseOsc.connect(chaseGain).connect(audioContext.destination);
      chaseOsc.start();
      chaseOsc.gain = chaseGain;
    }

    function updateHotbar() {
      hotbar.innerHTML = '';
      const keys = Object.keys(inventory);
      for (let i = 0; i < 9; i++) {
        const slot = document.createElement('div');
        slot.className = 'hotbar-slot' + (selectedSlot === i ? ' selected' : '');
        const item = keys[i] || '';
        slot.innerHTML = item ? `${itemLabels[item] || item}<br/><small>${inventory[item] || 0}</small>` : '';
        slot.onclick = () => selectedSlot = i;
        hotbar.appendChild(slot);
      }
    }

    function updateUI() {
      updateHotbar();
      updateStatus();
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function updateStatus() {
      uiStatus.innerHTML = `Time: ${state.time.toFixed(1)}:00 &nbsp;|&nbsp; ${state.night ? 'Night' : 'Day'}<br/>
        Sanity: ${Math.round(player.sanity)}% &nbsp;|&nbsp; Health: ${Math.round(player.health)}%<br/>
        ${state.alert}`;
    }

    function screenPoint(x, y) { return { x: x * canvas.width, y: y * canvas.height }; }

    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.5);
      if (state.night) { sky.addColorStop(0, '#02050C'); sky.addColorStop(1, '#12181F'); }
      else { sky.addColorStop(0, '#7AA9E2'); sky.addColorStop(1, '#B6DCF5'); }
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height * 0.5);

      const ground = ctx.createLinearGradient(0, canvas.height * 0.4, 0, canvas.height);
      ground.addColorStop(0, '#1d3317');
      ground.addColorStop(1, '#070b05');
      ctx.fillStyle = ground;
      ctx.fillRect(0, canvas.height * 0.4, canvas.width, canvas.height * 0.6);

      const dir = { x: Math.sin(player.yaw), y: Math.cos(player.yaw) };
      const plane = { x: -dir.y * 0.7, y: dir.x * 0.7 };
      const baseX = canvas.width / 2;
      const baseY = canvas.height * 0.45;

      for (let depth = 6; depth >= 1; depth--) {
        const scale = 1 - depth * 0.1;
        for (let ix = -2; ix <= 2; ix++) {
          const angle = player.yaw + ix * 0.25;
          const tx = Math.round(player.x + Math.sin(angle) * depth);
          const ty = Math.round(player.y + Math.cos(angle) * depth);
          if (tx < 0 || tx >= 20 || ty < 0 || ty >= 20) continue;
          const type = world[tx][ty];
          const screenX = baseX + ix * 150 * scale;
          const screenY = baseY - depth * 28;
          drawObject(screenX, screenY, scale, type);
        }
      }

      objects.forEach(obj => {
        const dx = obj.x - player.x;
        const dy = obj.y - player.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 10) {
          const angle = Math.atan2(dx, dy) - player.yaw;
          const screenX = baseX + Math.sin(angle) * 180;
          drawObject(screenX, baseY - dist * 18, 0.6, obj.type);
        }
      });

      if (state.stakerActive && state.staker.distance < 12) {
        const angle = Math.atan2(state.staker.x - player.x, state.staker.y - player.y) - player.yaw;
        const screenX = baseX + Math.sin(angle) * 220;
        drawObject(screenX, baseY - state.staker.distance * 18, 0.8, 'staker');
      }

      if (player.dead) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff4d4d';
        ctx.font = 'bold 56px Arial';
        ctx.fillText('YOU DIED', canvas.width / 2 - 140, canvas.height / 2);
        ctx.font = '20px Arial';
        ctx.fillText('Press R to restart', canvas.width / 2 - 100, canvas.height / 2 + 40);
      }

      if (state.jumpScare) {
        ctx.fillStyle = 'rgba(255,0,0,0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 68px Arial';
        ctx.fillText('S T A L K E D', canvas.width / 2 - 250, canvas.height / 2);
      }
    }

    function drawObject(x, y, scale, type) {
      const size = 80 * scale;
      if (type === 'tree') {
        ctx.fillStyle = '#2e3d14';
        ctx.fillRect(x - 8 * scale, y, 16 * scale, 70 * scale);
        ctx.fillStyle = '#315519';
        ctx.beginPath();
        ctx.ellipse(x, y - 20 * scale, 40 * scale, 30 * scale, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'house') {
        ctx.fillStyle = '#45301f';
        ctx.fillRect(x - 40 * scale, y, 80 * scale, 80 * scale);
        ctx.fillStyle = '#2b1f12';
        ctx.beginPath();
        ctx.moveTo(x - 45 * scale, y);
        ctx.lineTo(x, y - 50 * scale);
        ctx.lineTo(x + 45 * scale, y);
        ctx.fill();
      } else if (type === 'staker') {
        ctx.fillStyle = '#330000';
        ctx.beginPath();
        ctx.arc(x, y + 10 * scale, 22 * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff4d4d';
        ctx.beginPath();
        ctx.arc(x, y + 8 * scale, 10 * scale, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'rock') {
        ctx.fillStyle = '#5d5d5d';
        ctx.beginPath();
        ctx.ellipse(x, y + 10 * scale, 34 * scale, 24 * scale, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'torch') {
        ctx.fillStyle = '#4f2c0e';
        ctx.fillRect(x - 4 * scale, y, 8 * scale, 26 * scale);
        ctx.fillStyle = '#ffcc33';
        ctx.beginPath();
        ctx.arc(x, y - 6 * scale, 10 * scale, 0, Math.PI * 2);
        ctx.fill();
      } else if (type === 'factoryNode') {
        ctx.fillStyle = '#4a4a4a';
        ctx.fillRect(x - 25 * scale, y, 50 * scale, 40 * scale);
        ctx.fillStyle = '#7b7b7b';
        ctx.fillRect(x - 20 * scale, y + 10 * scale, 40 * scale, 10 * scale);
      } else {
        ctx.fillStyle = '#31591d';
        ctx.beginPath();
        ctx.ellipse(x, y + 24 * scale, 90 * scale, 40 * scale, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function movePlayer(dt) {
      if (player.dead) return;
      const walkSpeed = 2.5;
      const dx = (keys['d'] ? 1 : 0) - (keys['a'] ? 1 : 0);
      const dy = (keys['s'] ? 1 : 0) - (keys['w'] ? 1 : 0);
      const forwardX = Math.sin(player.yaw);
      const forwardY = Math.cos(player.yaw);
      const rightX = Math.cos(player.yaw);
      const rightY = -Math.sin(player.yaw);
      const vx = (dy * forwardX + dx * rightX) * walkSpeed * dt;
      const vy = (dy * forwardY + dx * rightY) * walkSpeed * dt;
      player.x = clamp(player.x + vx, 1, 18);
      player.y = clamp(player.y + vy, 1, 18);
      player.yaw += (keys['q'] ? -0.02 : 0) + (keys['e'] ? 0.02 : 0);
    }

    function worldAt(x, y) {
      const ix = Math.round(x);
      const iy = Math.round(y);
      if (ix < 0 || ix >= 20 || iy < 0 || iy >= 20) return 'void';
      return world[ix][iy];
    }

    function updateGame(dt) {
      if (player.dead) return;
      state.time += dt * 0.02;
      if (state.time >= 24) state.time -= 24;
      state.night = state.time >= 18 || state.time < 6;

      movePlayer(dt);
      const terrain = worldAt(player.x, player.y);
      player.inHouse = terrain === 'house';

      const light = player.torch || terrain === 'torch' || player.inHouse;
      if (state.night && !light) {
        player.sanity = clamp(player.sanity - dt * 1.2, 0, 100);
      } else {
        player.sanity = clamp(player.sanity + dt * 0.6, 0, 100);
      }

      if (player.sanity <= 0) {
        state.alert = 'You lost your mind. The Staker finishes you.';
        player.dead = true;
      }

      const dx = state.staker.x - player.x;
      const dy = state.staker.y - player.y;
      state.staker.distance = Math.hypot(dx, dy);
      if (!state.stakerActive && state.night) {
        state.stakerActive = true;
        state.alert = 'You feel something watching in the dark.';
      }
      if (state.stakerActive && !player.dead) {
        const speed = 1.2 + (state.night ? 0.5 : 0);
        if (state.staker.distance > 0.1) {
          state.staker.x += (dx / state.staker.distance) * speed * dt;
          state.staker.y += (dy / state.staker.distance) * speed * dt;
        }
      }

      if (state.staker.distance < 6 && state.stakerActive) {
        state.alert = 'The Staker is nearby! Run!';
        state.jumpScare = Math.random() < 0.006;
        chaseOsc.gain.gain.value = clamp((6 - state.staker.distance) * 0.02, 0, 0.08);
      } else {
        state.jumpScare = false;
        chaseOsc.gain.gain.value = 0;
      }

      if (state.staker.distance < 1.5) {
        player.dead = true;
        state.alert = 'The Staker caught you!';
      }

      if (terrain === 'torch') {
        player.torch = true;
      }

      if (player.inHouse && !player.dead) {
        state.alert = 'You are inside the haunted house. The air is cold.';
      }

      if (player.sanity < 30) {
        overlay.style.background = 'rgba(64,0,0,0.24)';
      } else {
        overlay.style.background = 'transparent';
      }

      updateStatus();
      updateHotbar();
    }

    let lastTime = performance.now();
    const keys = {};
    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      updateGame(dt);
      drawScene();
      requestAnimationFrame(loop);
    }

    function openMenu(type) {
      menu.style.display = 'flex';
      menuPanel.innerHTML = '';
      if (type === 'inventory') {
        const title = document.createElement('h2');
        title.textContent = 'Inventory';
        menuPanel.appendChild(title);
        const grid = document.createElement('div');
        grid.className = 'inventory-grid';
        Object.entries(inventory).forEach(([item, count]) => {
          const slot = document.createElement('div');
          slot.className = 'slot';
          slot.innerHTML = `<strong>${itemLabels[item] || item}</strong><br/>x${count}`;
          grid.appendChild(slot);
        });
        menuPanel.appendChild(grid);
      }
      if (type === 'crafting') {
        const title = document.createElement('h2');
        title.textContent = 'Crafting';
        menuPanel.appendChild(title);
        recipes.forEach(recipe => {
          const recipeDiv = document.createElement('div');
          const can = Object.entries(recipe.requires).every(([item, qty]) => inventory[item] >= qty);
          recipeDiv.className = 'recipe' + (can ? ' craftable' : '');
          recipeDiv.innerHTML = `<strong>${recipe.name}</strong><br/><small>${Object.entries(recipe.requires).map(([item, qty]) => `${itemLabels[item] || item} x${qty}`).join(' + ')}</small>`;
          if (can) recipeDiv.onclick = () => {
            Object.entries(recipe.requires).forEach(([item, qty]) => inventory[item] -= qty);
            Object.entries(recipe.produces).forEach(([item, qty]) => inventory[item] = (inventory[item] || 0) + qty);
            state.alert = `Crafted ${recipe.name}.`;
            updateUI();
            openMenu('crafting');
          };
          menuPanel.appendChild(recipeDiv);
        });
      }
      const closeButton = document.createElement('button');
      closeButton.className = 'button';
      closeButton.textContent = 'Close';
      closeButton.onclick = () => { menu.style.display = 'none'; };
      menuPanel.appendChild(closeButton);
    }

    document.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (e.key.toLowerCase() === 'i') openMenu('inventory');
      if (e.key.toLowerCase() === 'c') openMenu('crafting');
      if (e.key.toLowerCase() === 'r' && player.dead) location.reload();
      if (e.key.toLowerCase() === 'p') player.torch = !player.torch;
    });
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    canvas.addEventListener('click', () => {
      if (document.pointerLockElement !== canvas) {
        canvas.requestPointerLock();
      }
      startAmbient();
    });
    document.addEventListener('pointerlockchange', () => {
      canvas.style.cursor = document.pointerLockElement === canvas ? 'none' : 'default';
    });
    document.addEventListener('mousemove', e => {
      if (document.pointerLockElement === canvas && !player.dead) {
        player.yaw += e.movementX * 0.0025;
      }
    });
    document.addEventListener('mousedown', e => {
      if (e.button === 2) player.torch = !player.torch;
    });

    updateStatus();
    updateHotbar();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
